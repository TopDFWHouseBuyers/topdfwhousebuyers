name: Generate City Pages

on:
  workflow_dispatch:  # Manual trigger only — run once

jobs:
  generate-cities:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate all city pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_cities.py

      - name: Update sitemap
        run: python scripts/generate_sitemap.py

      - name: Commit and push
        run: |
          git config --global user.name "TopDFW Blog Bot"
          git config --global user.email "bot@topdfwhousebuyers.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: Generated all 21 city landing pages"
          git push
