name: Generate Blog Post

on:
  schedule:
    - cron: '0 13 * * 1'   # Monday 8am CT
    - cron: '0 13 * * 3'   # Wednesday 8am CT
    - cron: '0 13 * * 5'   # Friday 8am CT
    - cron: '0 13 * * 6'   # Saturday 8am CT
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install anthropic
      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py
      - name: Update sitemap
        run: python scripts/generate_sitemap.py
      - name: Commit and push
        run: |
          git config --global user.name "TopDFW Blog Bot"
          git config --global user.email "bot@topdfwhousebuyers.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: New blog post + sitemap $(date '+%A %B %d %Y')"
          git push
